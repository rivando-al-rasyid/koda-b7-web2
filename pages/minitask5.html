  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="../styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

  <header>
    <nav class="navbar">
      <ul>
        <li><a href="/index.html">← Kembali</a></li>
        <li><a href="/pages/minitask1.html">Minitask 1</a></li>
        <li><a href="/pages/minitask2.html">Minitask 2</a></li>
        <li><a href="/pages/minitask3.html">Minitask 3</a></li>
        <li><a href="/pages/minitask4.html">Minitask 4</a></li>
        <li><a href="/pages/minitask6.html">Minitask 6</a></li>
      </ul>
    </nav>
    <figure>
      <img src="../assets/manajemen-waktu.png" alt="Ilustrasi manajemen waktu">
    </figure>
    <h1>Form Survey</h1>
  </header>

  <main class="center">
    <section>
      <form action="" method="post">
        <div>
          <label for="Nama">Nama</label>
          <input type="text" id="Nama" name="nama">
        </div>

        <div>
          <label for="Umur">Umur</label>
          <input type="text" id="Umur" name="umur">
        </div>

        <fieldset>
          <legend>Jenis Kelamin</legend>
          <input type="radio" name="JenisKelamin" id="L" value="L">
          <label for="L">Laki-laki</label>
          <input type="radio" name="JenisKelamin" id="P" value="P">
          <label for="P">Perempuan</label>
        </fieldset>

        <div>
          <label for="ApakahPerokok">Apakah Anda Seorang Perokok?</label>
          <select id="ApakahPerokok" name="apakah_perokok">
            <option value="" hidden selected disabled>Pilih Salah Satu</option>
            <option value="Iya">Iya</option>
            <option value="Tidak">Tidak</option>
          </select>
        </div>

        <fieldset>
          <legend>Brand Rokok yang Digunakan</legend>
          <label>
            <input type="checkbox" name="merek_rokok" value="Djarum" >
            Djarum
          </label>
          <label>
            <input type="checkbox" name="merek_rokok" value="Gudang Garam">
            Gudang Garam
          </label>
          <label>
            <input type="checkbox" name="merek_rokok" value="Sampoerna">
            Sampoerna
          </label>
          <label>
            <input type="checkbox" name="merek_rokok" value="LA Lights">
            LA Lights
          </label>
        </fieldset>

        <div class="form-actions">
          <button type="reset">Reset</button>
          <button type="submit">Submit</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../js/main.js" defer></script>
</body>

</html>
